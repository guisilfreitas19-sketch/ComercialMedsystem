<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance Dashboard Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); }
        .tab-active { color: #4f46e5; border-bottom: 3px solid #4f46e5; background: #f5f3ff; }
        .input-field { transition: all 0.3s ease; border: 2px solid #f3f4f6; }
        .input-field:focus { border-color: #4f46e5; background: white; box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1); }
    </style>
</head>
<body class="bg-[#F8FAFC] min-h-screen font-sans antialiased text-slate-900">

    <header class="bg-white shadow-sm sticky top-0 z-20">
        <div class="flex max-w-lg mx-auto">
            <button onclick="mudarAba('med')" id="btn-med" class="flex-1 py-4 text-sm font-black uppercase tracking-widest transition-all tab-active">
                <i class="fa-solid fa-briefcase-medical mr-2"></i>MEDSYSTEM
            </button>
            <button onclick="mudarAba('ecos')" id="btn-ecos" class="flex-1 py-4 text-sm font-black uppercase tracking-widest text-slate-400 transition-all">
                <i class="fa-solid fa-leaf mr-2"></i>ECOS
            </button>
        </div>
    </header>

    <main class="max-w-lg mx-auto p-4 space-y-5">
        
        <section class="bg-white rounded-3xl p-6 shadow-sm border border-slate-100">
            <div class="flex items-center justify-between mb-4">
                <h2 class="text-[10px] font-black text-slate-400 uppercase tracking-tighter">Entrada de Dados</h2>
                <span class="px-3 py-1 bg-indigo-50 text-indigo-600 rounded-full text-[10px] font-bold" id="badge-empresa">MEDSYSTEM</span>
            </div>
            
            <div class="space-y-4">
                <div>
                    <label class="text-[10px] font-bold text-slate-500 uppercase ml-1">Faturamento Atual</label>
                    <input type="number" id="atual" oninput="salvarECalcular()" class="input-field w-full mt-1 p-4 bg-slate-50 rounded-2xl text-2xl font-black text-indigo-600 outline-none" placeholder="R$ 0,00">
                </div>
                
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="text-[10px] font-bold text-slate-500 uppercase ml-1">Ref. 2025</label>
                        <input type="number" id="ref2025" oninput="salvarECalcular()" class="input-field w-full mt-1 p-3 bg-slate-50 rounded-xl text-sm font-bold" placeholder="2025">
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-slate-500 uppercase ml-1">Pior 2026</label>
                        <input type="number" id="pior2026" oninput="salvarECalcular()" class="input-field w-full mt-1 p-3 bg-slate-50 rounded-xl text-sm font-bold" placeholder="Pior">
                    </div>
                </div>
                <div>
                    <label class="text-[10px] font-bold text-slate-500 uppercase ml-1">Meta Recorde (Melhor Mês)</label>
                    <input type="number" id="melhor2026" oninput="salvar
