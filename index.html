<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ranking Comercial Medsystem</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-950 text-slate-100 font-sans pb-20">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        function App() {
            // Carrega dados salvos ou inicia do zero
            const initialState = JSON.parse(localStorage.getItem('rankingData')) || [
                { id: 1, name: 'Guilherme', sales: 0, contracts: 0, target: 6000 },
                { id: 2, name: 'Vanessa', sales: 0, contracts: 0, target: 6000 },
                { id: 3, name: 'Luiz', sales: 0, contracts: 0, target: 3000 },
                { id: 4, name: 'João', sales: 0, contracts: 0, target: 3000 }
            ];

            const [sellers, setSellers] = useState(initialState);

            // Salva sempre que houver mudança
            useEffect(() => {
                localStorage.setItem('rankingData', JSON.stringify(sellers));
            }, [sellers]);

            const handleManualUpdate = (id, field, value) => {
                const numericValue = parseFloat(value) || 0;
                setSellers(prev => prev.map(s => 
                    s.id === id ? { ...s, [field]: numericValue } : s
                ));
            };

            const resetAll = () => {
                if(confirm("Deseja zerar todos os valores do ranking?")) {
                    setSellers(sellers.map(s => ({ ...s, sales: 0, contracts: 0 })));
                }
            };

            const topSales = useMemo(() => [...sellers].sort((a, b) => b.sales - a.sales), [sellers]);
            const topContracts = useMemo(() => [...sellers].sort((a, b) => b.contracts - a.contracts), [sellers]);

            const Podium = ({ title, data, field, activeColor }) => (
                <div className="flex-1 bg-slate-900 p-6 rounded-[2rem] border border-slate-800 shadow-xl">
                    <h2 className="text-center text-[10px] font-bold uppercase tracking-widest mb-6 text-slate-400">{title}</h2>
                    <div className="h-44 flex items-end justify-center gap-3">
                        <div className="flex flex-col items-center w-1/3 text-center">
                            <span className="text-[10px] mb-1 truncate w-full">{data[1].name}</span>
                            <div className="w-full bg-slate-800 h-16 rounded-t-xl border-t-2 border-slate-700 flex flex-col items-center justify-center">
                                <span className="text-[10px] font-bold text-slate-400">R${data[1][field]}</span>
                            </div>
                        </div>
                        <div className="flex flex-col items-center w-1/3 text-center">
                            <span className="text-[11px] font-black text-emerald-400 mb-1 truncate w-full uppercase">{data[0].name}</span>
                            <div className={`w-full ${activeColor} h-32 rounded-t-xl border-t-2 border-white/20 flex flex-col items-center justify-center shadow-lg`}>
                                <span className="text-2xl font-black italic">1º</span>
                                <span className="text-[10px] font-bold leading-tight text-white">R${data[0][field]}</span>
                            </div>
                        </div>
                        <div className="flex flex-col items-center w-1/3 text-center">
                            <span className="text-[10px] mb-1 truncate w-full opacity-50">{data[2].name}</span>

                                <span className="
