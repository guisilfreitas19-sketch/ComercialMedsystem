<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ranking Comercial - Grupo Soitic</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #09090b; color: #f8fafc; }
        .bg-card { background-color: #18181b; border: 1px solid #27272a; }
        .bar-transition { transition: width 1s ease-in-out; }
        .input-field { background: #000; border: 1px solid #333; color: #fff; border-radius: 12px; padding: 10px; text-align: right; width: 100%; }
        .input-field:focus { border-color: #10b981; outline: none; }
        .currency-label { font-size: 0.7rem; font-weight: 800; margin-bottom: 4px; display: block; }
    </style>
</head>
<body class="pb-20">

    <header class="border-b border-white/10 bg-black/50 sticky top-0 z-50 backdrop-blur-md">
        <div class="max-w-5xl mx-auto px-6 py-4 flex justify-between items-center">
            <div>
                <h1 class="text-xl font-black italic uppercase">Grupo <span class="text-amber-500">Soitic</span></h1>
                <p class="text-[9px] tracking-[0.3em] text-slate-500 font-bold uppercase">Performance Comercial</p>
            </div>
            <button onclick="resetData()" class="text-[9px] font-bold border border-red-900/30 text-red-500 px-4 py-2 rounded-full hover:bg-red-500 hover:text-white transition-all">ZERAR RANKING</button>
        </div>
    </header>

    <main class="max-w-5xl mx-auto px-6 py-10 space-y-12">
        <div class="grid md:grid-cols-2 gap-8" id="podiums-container"></div>

        <div class="bg-card rounded-[2rem] overflow-hidden shadow-2xl">
            <div class="p-6 border-b border-white/5 bg-white/5">
                <h2 class="text-xs font-black uppercase tracking-widest text-slate-400 italic">Lançamento de Vendas e Contratos</h2>
            </div>
            <div id="sellers-list" class="p-4 md:p-8 space-y-6"></div>
        </div>
    </main>

    <script>
        // Dados Iniciais
        let sellers = JSON.parse(localStorage.getItem('soitic_v4')) || [
            { id: 1, name: 'Guilherme', sales: 0, contracts: 0, target: 6000 },
            { id: 2, name: 'Vanessa', sales: 0, contracts: 0, target: 6000 },
            { id: 3, name: 'Luiz', sales: 0, contracts: 0, target: 3000 },
            { id: 4, name: 'João', sales: 0, contracts: 0, target: 3000 }
        ];

        function formatCurrency(val) {
            return new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(val || 0);
        }

        function updateValue(id, field, value) {
            const numValue = parseFloat(value) || 0;
            const seller = sellers.find(s => s.id === id);
            
            // Confetti se atingir a meta
            if (field === 'sales' && numValue >= seller.target && seller.sales < seller.target) {
                confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
            }

            seller[field] = numValue;
            saveAndRender();
        }

        function resetData() {
            if(confirm("Zerar todos os dados?")) {
                sellers.forEach(s => { s.sales = 0; s.contracts = 0; });
                saveAndRender();
            }
        }

        function saveAndRender() {
            localStorage.setItem('soitic_v4', JSON.stringify(sellers));
            render();
        }

        function render() {
            const list = document.getElementById('sellers-list');
            const podiums = document.getElementById('podiums-container');
            
            // Ordenação
            const sortedSales = [...sellers].sort((a, b) => b.sales - a.sales);
            const sortedContracts = [...sellers].sort((a, b) => b.contracts - a.contracts);

            // Render Pódios
            podiums.innerHTML = `
                ${renderPodium("Total em Vendas", sortedSales, 'sales', 'bg-emerald-600')}
                ${renderPodium("Contratos Aceitos", sortedContracts, 'contracts', 'bg-blue-600')}
            `;

            // Render Lista
            list.innerHTML = sellers.map(s => {
                const progress = Math.min((s.sales / s.target) * 100, 100);
                const remaining = s.target - s.sales;
                return `
                    <div class="p-6 rounded-2xl bg-white/5 border border-white/5">
                        <div class="flex flex-col md:flex-row items-center gap-6">
                            <div class="w-full md:w-48">
                                <p class="font-black text-lg uppercase italic leading-none">${s.name}</p>
                                <p class="text-[10px] text-slate-500 font-bold uppercase">Meta: ${formatCurrency(s.target)}</p>
                            </div>
                            <div class="grid grid-cols-2 gap-4 w-full">
                                <div>
                                    <label class="currency-label text-emerald-500 uppercase italic">Vendas</label>
                                    <input type="number" value="${s.sales || ''}" oninput="updateValue(${s.id}, 'sales', this.value)" class="input-field" placeholder="0.00">
                                </div>
                                <div>
                                    <label class="currency-label text-blue-500 uppercase italic">Contratos</label>
                                    <input type="number" value="${s.contracts || ''}" oninput="updateValue(${s.id}, 'contracts', this.value)" class="input-field" placeholder="0.00">
                                </div>
                            </div>
                        </div>
                        <div class="mt-6 space-y-2">
                            <div class="flex justify-between text-[10px] font-bold">
                                <span class="text-slate-500 uppercase">${remaining <= 0 ? '🏆 META BATIDA' : 'FALTAM ' + formatCurrency(remaining)}</span>
                                <span class="${progress >= 100 ? 'text-amber-500' : 'text-emerald-500'}">${Math.round(progress)}%</span>
                            </div>
                            <div class="h-2 w-full bg-black rounded-full overflow-hidden">
                                <div class="h-full bar-transition ${progress >= 100 ? 'bg-amber-500' : 'bg-emerald-500'}" style="width: ${progress}%"></div>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function renderPodium(title, data, field, color) {
            return `
                <div class="bg-card rounded-3xl p-6 border border-white/5">
                    <h3 class="text-[10px] font-black uppercase tracking-widest text-slate-500 mb-6">${title}</h3>
                    <div class="flex items-end justify-center gap-2 h-32">
                        <div class="text-center w-full">
                            <span class="text-[9px] block mb-1 truncate">${data[1].name}</span>
                            <div class="bg-white/5 h-12 rounded-t-xl border-t border-white/5 flex items-center justify-center text-[8px] opacity-40">${formatCurrency(data[1][field])}</div>
                        </div>
                        <div class="text-center w-full">
                            <span class="text-[10px] font-black uppercase italic mb-1 block">${data[0].name}</span>
                            <div class="${color} h-24 rounded-t-xl shadow-lg border-t border-white/20 flex flex-col items-center justify-center">
                                <span class="text-2xl font-black italic">1º</span>
                                <span class="text-[8px] font-bold">${formatCurrency(data[0][field])}</span>
                            </div>
                        </div>
                        <div class="text-center w-full">
                            <span class="text-[9px] block mb-1 truncate text-slate-700">${data[2].name}</span>
                            <div class="bg-white/5 h-8 rounded-t-xl border-t border-white/5 flex items-center justify-center text-[7px] opacity-20">${formatCurrency(data[2][field])}</div>
                        </div>
                    </div>
                </div>
            `;
        }

        // Inicia o app
        render();
    </script>
</body>
</html>
