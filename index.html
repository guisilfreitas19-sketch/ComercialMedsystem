<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ranking Comercial - Grupo Soitic</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #09090b; color: #f8fafc; overflow-x: hidden; }
        .bg-card { background-color: #18181b; border: 1px solid #27272a; }
        .bar-transition { transition: width 1.5s cubic-bezier(0.34, 1.56, 0.64, 1); }
        @keyframes pulse-soft { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .animate-pulse-soft { animation: pulse-soft 3s infinite; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTeqDgQxN1x6PHp_P6LFiWbUM9n6TzqrNYg928ibxN79YNOsV_24dYR2_Gj-ZhaoCwElnjvCfUYxlLJ/pub?gid=752707603&single=true&output=csv";

        const formatCurrency = (val) => new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(val);

        function App() {
            const [sellers, setSellers] = useState([]);
            const [loading, setLoading] = useState(true);

            const fetchData = async () => {
                try {
                    const response = await fetch(SHEET_URL);
                    const text = await response.text();
                    const rows = text.split('\n');
                    
                    const sellersConfig = [
                        { name: 'Guilherme', target: 6000 },
                        { name: 'Vanessa', target: 6000 },
                        { name: 'Luiz', target: 3000 },
                        { name: 'João', target: 3000 }
                    ];

                    const updatedData = sellersConfig.map(vendedor => {
                        const row = rows.find(r => r.includes(vendedor.name));
                        if (row) {
                            const columns = row.split(',');
                            // Coluna F (Total Geral) é o index 5
                            let rawValue = columns[5] || "0";
                            // Limpa R$, pontos de milhar e troca vírgula por ponto
                            const cleanValue = rawValue.replace(/[R$\s]/g, '').replace(/\./g, '').replace(',', '.');
                            const totalSales = parseFloat(cleanValue) || 0;
                            return { ...vendedor, sales: totalSales };
                        }
                        return { ...vendedor, sales: 0 };
                    });

                    setSellers(updatedData);
                    setLoading(false);
                } catch (e) { 
                    console.error("Erro na sincronização", e); 
                }
            };

            useEffect(() => {
                fetchData();
                const timer = setInterval(fetchData, 30000); // Atualiza a cada 30 segundos
                return () => clearInterval(timer);
            }, []);

            const sorted = useMemo(() => [...sellers].sort((a, b) => b.sales - a.sales), [sellers]);

            if (loading) return (
                <div className="h-screen flex flex-col items-center justify-center space-y-4">
                    <div className="w-12 h-12 border-4 border-emerald-500/20 border-t-emerald-500 rounded-full animate-spin"></div>
                    <p className="text-slate-500 font-black uppercase tracking-[0.3em] text-xs">Sincronizando Grupo Soitic...</p>
                </div>
            );

            return (
                <div className="max-w-4xl mx-auto px-6 py-12 lg:py-20 space-y-12">
                    <header className="text-center relative">
                        <h1 className="text-5xl md:text-6xl font-black italic uppercase tracking-tighter text-white">
                            GRUPO <span className="text-emerald-500">SOITIC</span>
                        </h1>
                        <p className="text-[10px] text-slate-500 font-bold uppercase tracking-[0.6em] mt-3">Ranking Comercial de Resultados</p>
                    </header>

                    {/* Dashboard Principal */}
                    <div className="bg-card rounded-[3rem] p-8 md:p-12 shadow-2xl relative border border-white/5 overflow-hidden">
                        {/* Indicador de Live */}
                        <div className="absolute top-6 right-8 flex items-center gap-2">
                            <span className="relative flex h-2 w-2">
                                <span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                                <span className="relative inline-flex rounded-full h-2 w-2 bg-emerald-500"></span>
                            </span>
                            <span className="text-[9px] font-black text-emerald-500 uppercase tracking-widest">Sincronizado</span>
                        </div>

                        {/* Pódio Visual */}
                        <div className="flex items-end justify-center gap-4 h-52 mb-16 border-b border-slate-800/50 pb-8">
                            {/* 2º Lugar */}
                            <div className="flex flex-col items-center w-full max-w-[130px]">
                                <span className="text-[10px] font-bold text-slate-400 mb-2 truncate w-full text-center uppercase tracking-tighter">{sorted[1]?.name}</span>
                                <div className="w-full bg-slate-800/40 h-24 rounded-t-2xl flex flex-col items-center justify-center border-t border-white/5 relative group">
                                    <span className="text-[10px] font-mono font-bold text-slate-300 group-hover:text-white transition-colors">
                                        {formatCurrency(sorted[1]?.sales || 0)}
                                    </span>
                                    <div className="absolute -bottom-2 bg-slate-700 px-3 py-0.5 rounded-full text-[9px] font-black">2º</div>
                                </div>
                            </div>

                            {/* 1º Lugar */}
                            <div className="flex flex-col items-center w-full max-w-[160px]">
                                <span className="text-xs font-black text-emerald-400 mb-2 truncate w-full text-center uppercase tracking-widest">{sorted[0]?.name}</span>
                                <div className="w-full bg-gradient-to-b from-emerald-500 to-emerald-700 h-40 rounded-t-3xl flex flex-col items-center justify-center shadow-[0_0_50px_rgba(16,185,129,0.25)] border-t border-white/30 relative">
                                    <span className="text-5xl font-black italic text-white drop-shadow-lg">1º</span>
                                    <span className="text-[11px] font-black text-white/90 px-2 text-center mt-1">
                                        {formatCurrency(sorted[0]?.sales || 0)}
                                    </span>
                                    <div className="absolute -top-4 text-2xl">👑</div>
                                </div>
                            </div>

                            {/* 3º Lugar */}
                            <div className="flex flex-col items-center w-full max-w-[130px]">
                                <span className="text-[10px] font-bold text-slate-500 mb-2 truncate w-full text-center uppercase tracking-tighter">{sorted[2]?.name}</span>
                                <div className="w-full bg-slate-800/20 h-16 rounded-t-2xl flex flex-col items-center justify-center border-t border-white/5 relative">
                                    <span className="text-[9px] font-mono font-bold text-slate-500">
                                        {formatCurrency(sorted[2]?.sales || 0)}
                                    </span>
                                    <div className="absolute -bottom-2 bg-slate-900 px-3 py-0.5 rounded-full text-[9px] font-black text-slate-600">3º</div>
                                </div>
                            </div>
                        </div>

                        {/* Listagem com Barras de Meta */}
                        <div className="grid gap-8">
                            {sellers.map(s => {
                                const progress = Math.min((s.sales / s.target) * 100, 100);
                                const isGoalHit = progress >= 100;
                                return (
                                    <div key={s.id} className="group">
                                        <div className="flex justify-between items-end mb-3 px-1">
                                            <div className="space-y-1">
                                                <h3 className="text-base font-black uppercase text-white tracking-tight group-hover:text-emerald-400 transition-colors">{s.name}</h3>
                                                <div className="flex items-center gap-3">
                                                    <span className="text-[9px] text-slate-500 font-black uppercase bg-white/5 px-2 py-0.5 rounded-md">Meta {formatCurrency(s.target)}</span>
                                                    {isGoalHit && <span className="text-[9px] font-black text-amber-500 uppercase animate-bounce">🏆 Meta Batida!</span>}
                                                </div>
                                            </div>
                                            <div className="text-right">
                                                <div className="text-sm font-mono font-black text-emerald-400">
                                                    {formatCurrency(s.sales)}
                                                </div>
                                                <div className={`text-[11px] font-black ${isGoalHit ? 'text-amber-500' : 'text-slate-500'}`}>
                                                    {Math.round(progress)}%
                                                </div>
                                            </div>
                                        </div>
                                        <div className="h-3 w-full bg-slate-900/50 rounded-full overflow-hidden p-[2px] border border-white/5">
                                            <div 
                                                className={`h-full rounded-full bar-transition ${isGoalHit ? 'bg-gradient-to-r from-yellow-500 via-amber-400 to-yellow-500 shadow-[0_0_20px_rgba(245,158,11,0.4)]' : 'bg-gradient-to-r from-emerald-600 to-emerald-400'}`}
                                                style={{ width: `${progress}%` }}
                                            ></div>
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    </div>

                    <footer className="text-center">
                        <p className="text-[9px] font-black text-slate-700 uppercase tracking-[0.3em] animate-pulse-soft">
                            Atualização Automática via Google Sheets • Grupo Soitic © 2026
                        </p>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
