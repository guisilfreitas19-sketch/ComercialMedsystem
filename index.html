<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Monitor de Metas V2.0 Final | SOITIC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            overflow: hidden; 
            background: #0f172a; 
            height: 100vh;
            touch-action: manipulation;
        }
        .glass-card { background: rgba(255, 255, 255, 0.98); height: 85vh; box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        .bg-main { background: radial-gradient(circle at top right, #1e293b, #020617); }
        .title-glow { text-shadow: 0 0 20px rgba(16, 185, 129, 0.3); font-style: italic; }
        .res-card { border-left-width: 6px; height: 78px; transition: transform 0.2s; }
        input::placeholder { color: #cbd5e1; opacity: 0.5; }
    </style>
</head>
<body class="bg-main p-3 text-slate-800">

    <div class="text-center pb-3">
        <h1 class="text-3xl font-[800] text-white tracking-widest uppercase title-glow">
            MONITOR DE <span class="text-emerald-400">METAS & RECORDES</span>
        </h1>
        <div class="text-[10px] text-emerald-500/50 font-bold uppercase tracking-widest">Sincronização Ativa V2.0 Final</div>
    </div>

    <div class="max-w-[100%] mx-auto grid grid-cols-2 gap-6">
        
        <div class="glass-card rounded-[2.5rem] p-5 border-b-[8px] border-emerald-500 flex flex-col">
            <h2 class="text-2xl font-800 text-emerald-600 mb-4 text-center uppercase italic tracking-tighter">Ecos</h2>
            
            <div class="space-y-4 flex-grow">
                <div class="bg-emerald-50/50 p-3 rounded-3xl border-2 border-emerald-100 shadow-inner">
                    <label class="text-[9px] font-black text-emerald-400 uppercase block mb-1 text-center italic">Faturamento Atual</label>
                    <input type="text" id="ecos-atual" oninput="aplicarMascara(this, 'ecos', 'atual')" class="w-full bg-transparent text-6xl font-800 text-emerald-700 outline-none text-center italic tracking-tighter" placeholder="R$ 0,00">
                </div>

                <div class="grid grid-cols-3 gap-2">
                    <div class="bg-slate-50 p-2 rounded-2xl border border-slate-200 text-center">
                        <label class="text-slate-400 block font-bold text-[9px] mb-1">REF. 2025</label>
                        <input type="text" id="ecos-ref2025" oninput="aplicarMascara(this, 'ecos', 'ref2025')" class="w-full text-center font-bold text-xs bg-transparent outline-none" placeholder="R$ 0,00">
                    </div>
                    <div class="bg-rose-50/30 p-2 rounded-2xl border border-rose-100 text-center">
                        <label class="text-rose-400 block font-bold text-[9px] mb-1">PIOR 2026</label>
                        <input type="text" id="ecos-pior2026" oninput="aplicarMascara(this, 'ecos', 'pior2026')" class="w-full text-center font-bold text-xs bg-transparent outline-none" placeholder="R$ 0,00">
                    </div>
                    <div class="bg-emerald-50/30 p-2 rounded-2xl border border-emerald-100 text-center">
                        <label class="text-emerald-400 block font-bold text-[9px] mb-1">MELHOR 2026</label>
                        <input type="text" id="ecos-melhor2026" oninput="aplicarMascara(this, 'ecos', 'melhor2026')" class="w-full text-center font-bold text-xs bg-transparent outline-none" placeholder="R$ 0,00">
                    </div>
                </div>

                <div id="res-ecos" class="space-y-3"></div>
            </div>
        </div>

        <div class="glass-card rounded-[2.5rem] p-5 border-b-[8px] border-indigo-500 flex flex-col">
            <h2 class="text-2xl font-800 text-indigo-600 mb-4 text-center uppercase italic tracking-tighter">Medsystem</h2>
            
            <div class="space-y-4 flex-grow">
                <div class="bg-indigo-50/50 p-3 rounded-3xl border-2 border-indigo-100 shadow-inner">
                    <label class="text-[9px] font-black text-indigo-400 uppercase block mb-1 text-center italic">Faturamento Atual</label>
                    <input type="text" id="med-atual" oninput="aplicarMascara(this, 'med', 'atual')" class="w-full bg-transparent text-6xl font-800 text-indigo-700 outline-none text-center italic tracking-tighter" placeholder="R$ 0,00">
                </div>

                <div class="grid grid-cols-3 gap-2">
                    <div class="bg-slate-50 p-2 rounded-2xl border border-slate-200 text-center">
                        <label class="text-slate-400 block font-bold text-[9px] mb-1">REF. 2025</label>
                        <input type="text" id="med-ref2025" oninput="aplicarMascara(this, 'med', 'ref2025')" class="w-full text-center font-bold text-xs bg-transparent outline-none" placeholder="R$ 0,00">
                    </div>
                    <div class="bg-rose-50/30 p-2 rounded-2xl border border-rose-100 text-center">
                        <label class="text-rose-400 block font-bold text-[9px] mb-1">PIOR 2026</label>
                        <input type="text" id="med-pior2026" oninput="aplicarMascara(this, 'med', 'pior2026')" class="w-full text-center font-bold text-xs bg-transparent outline-none" placeholder="R$ 0,00">
                    </div>
                    <div class="bg-emerald-50/30 p-2 rounded-2xl border border-emerald-100 text-center">
                        <label class="text-emerald-400 block font-bold text-[9px] mb-1">MELHOR 2026</label>
                        <input type="text" id="med-melhor2026" oninput="aplicarMascara(this, 'med', 'melhor2026')" class="w-full text-center font-bold text-xs bg-transparent outline-none" placeholder="R$ 0,00">
                    </div>
                </div>

                <div id="res-med" class="space-y-3"></div>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAbIBmJwJDWslFiJ9TazuLVHXM4yZTBDSs",
            authDomain: "dashboard-financeiro-cec1f.firebaseapp.com",
            databaseURL: "https://dashboard-financeiro-cec1f-default-rtdb.firebaseio.com",
            projectId: "dashboard-financeiro-cec1f",
            storageBucket: "dashboard-financeiro-cec1f.firebasestorage.app",
            messagingSenderId: "642067118768",
            appId: "1:642067118768:web:26307698c71a113099d975"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let dados = { med: {}, ecos: {} };

        // Recupera dados salvos e mantém sincronia
        db.ref('dashboard_data').on('value', (snap) => {
            const val = snap.val();
            if(val) { dados = val; renderizarTudo(); }
        });

        function formatarMoeda(v) { return v.toLocaleString('pt-br', { style: 'currency', currency: 'BRL' }); }

        function aplicarMascara(input, emp, campo) {
            let v = input.value.replace(/\D/g,'');
            v = (v/100).toFixed(2);
            const num = parseFloat(v) || 0;
            input.value = num > 0 ? formatarMoeda(num) : "";
            db.ref(`dashboard_data/${emp}/${campo}`).set(num);
        }

        function renderizarTudo() {
            ['med', 'ecos'].forEach(emp => {
                ['atual', 'ref2025', 'pior2026', 'melhor2026'].forEach(f => {
                    const el = document.getElementById(`${emp}-${f}`);
                    const val = dados[emp]?.[f] || 0;
                    if (el && document.activeElement !== el) {
                        el.value = val > 0 ? formatarMoeda(val) : '';
                    }
                });
                atualizarCards(emp);
            });
        }

        // Lógica corrigida para mostrar "Quanto Falta %"
        function criarCard(titulo, base, atual, icone) {
            if (!base || base <= 0) return '';
            const diff = atual - base;
            const isPos = diff >= 0;
            
            let porc;
            if (isPos) {
                porc = (((atual / base) - 1) * 100).toFixed(1);
            } else {
                porc = ((Math.abs(diff) / base) * 100).toFixed(1);
            }
            
            const cor = isPos ? 'emerald' : 'rose';
            const prefixo = isPos ? '+' : '';
            
            return `
                <div class="res-card p-3 px-5 rounded-[1.5rem] border-2 bg-${cor}-50/40 border-${cor}-200 flex items-center justify-between shadow-sm">
                    <div>
                        <div class="text-[10px] font-black text-slate-400 uppercase flex items-center gap-2 italic">
                            <span class="opacity-70">${icone}</span> ${titulo}
                        </div>
                        <p class="text-3xl font-800 text-${cor}-600 tracking-tighter">${formatarMoeda(Math.abs(diff))}</p>
                    </div>
                    <div class="text-right">
                        <div class="text-xl font-800 text-${cor}-500 tracking-tighter">${prefixo}${porc}%</div>
                        <div class="text-[8px] font-black uppercase px-3 py-0.5 rounded-full bg-${cor}-500 text-white shadow-sm">
                            ${isPos ? 'Superou' : 'Faltam'}
                        </div>
                    </div>
                </div>
            `;
        }

        function atualizarCards(emp) {
            const d = dados[emp] || {};
            const atual = parseFloat(d.atual) || 0;
            let html = "";
            html += criarCard("Vs. Ref. 2025", parseFloat(d.ref2025), atual, "📈");
            html += criarCard("Vs. Pior 2026", parseFloat(d.pior2026), atual, "📉");
            html += criarCard("Vs. Melhor 2026", parseFloat(d.melhor2026), atual, "🏆");
            document.getElementById(`res-${emp}`).innerHTML = html;
        }
    </script>
</body>
</html>
