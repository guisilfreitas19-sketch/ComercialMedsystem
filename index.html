<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitor Financeiro TV - Completo</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 min-h-screen p-2 italic">

    <div class="max-w-[1500px] mx-auto grid grid-cols-1 lg:grid-cols-2 gap-4">
        
        <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
            <div class="bg-indigo-700 p-2 text-center text-white font-black text-sm uppercase tracking-tighter">Medsystem</div>
            <div class="p-4 space-y-4">
                <div class="grid grid-cols-4 gap-2 text-center">
                    <div class="col-span-1">
                        <label class="text-[9px] font-bold text-slate-400 uppercase">Atual</label>
                        <input type="text" id="med-atual" oninput="processar(this, 'med', 'atual')" class="w-full p-2 bg-indigo-50 border rounded-lg text-sm font-black text-center text-indigo-700 outline-none">
                    </div>
                    <div>
                        <label class="text-[9px] font-bold text-slate-400 uppercase">Mar/25</label>
                        <input type="text" id="med-ref2025" oninput="processar(this, 'med', 'ref2025')" class="w-full p-2 bg-slate-50 border rounded-lg text-xs text-center outline-none">
                    </div>
                    <div>
                        <label class="text-[9px] font-bold text-slate-400 uppercase">Pior 26</label>
                        <input type="text" id="med-pior2026" oninput="processar(this, 'med', 'pior2026')" class="w-full p-2 bg-slate-50 border rounded-lg text-xs text-center outline-none">
                    </div>
                    <div>
                        <label class="text-[9px] font-bold text-slate-400 uppercase">Melhor 26</label>
                        <input type="text" id="med-melhor2026" oninput="processar(this, 'med', 'melhor2026')" class="w-full p-2 bg-slate-50 border rounded-lg text-xs text-center outline-none">
                    </div>
                </div>

                <div class="space-y-2" id="resultados-med">
                    </div>
            </div>
        </div>

        <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
            <div class="bg-emerald-700 p-2 text-center text-white font-black text-sm uppercase tracking-tighter">Ecos</div>
            <div class="p-4 space-y-4">
                <div class="grid grid-cols-4 gap-2 text-center">
                    <div class="col-span-1">
                        <label class="text-[9px] font-bold text-slate-400 uppercase">Atual</label>
                        <input type="text" id="ecos-atual" oninput="processar(this, 'ecos', 'atual')" class="w-full p-2 bg-emerald-50 border rounded-lg text-sm font-black text-center text-emerald-700 outline-none">
                    </div>
                    <div>
                        <label class="text-[9px] font-bold text-slate-400 uppercase">Mar/25</label>
                        <input type="text" id="ecos-ref2025" oninput="processar(this, 'ecos', 'ref2025')" class="w-full p-2 bg-slate-50 border rounded-lg text-xs text-center outline-none">
                    </div>
                    <div>
                        <label class="text-[9px] font-bold text-slate-400 uppercase">Pior 26</label>
                        <input type="text" id="ecos-pior2026" oninput="processar(this, 'ecos', 'pior2026')" class="w-full p-2 bg-slate-50 border rounded-lg text-xs text-center outline-none">
                    </div>
                    <div>
                        <label class="text-[9px] font-bold text-slate-400 uppercase">Melhor 26</label>
                        <input type="text" id="ecos-melhor2026" oninput="processar(this, 'ecos', 'melhor2026')" class="w-full p-2 bg-slate-50 border rounded-lg text-xs text-center outline-none">
                    </div>
                </div>

                <div class="space-y-2" id="resultados-ecos">
                    </div>
            </div>
        </div>
    </div>

    <script>
        const storeKey = 'dash_v_tv_final';
        let dados = JSON.parse(localStorage.getItem(storeKey)) || {
            med: { atual: 0, ref2025: 0, pior2026: 0, melhor2026: 0 },
            ecos: { atual: 0, ref2025: 0, pior2026: 0, melhor2026: 0 }
        };

        function format(v) { return v.toLocaleString('pt-br', { style: 'currency', currency: 'BRL' }); }

        function processar(input, emp, campo) {
            let v = input.value.replace(/\D/g,'');
            v = (v/100).toFixed(2) + '';
            v = v.replace(".", ",");
            v = v.replace(/(\d)(\d{3})(\d{3}),/g, "$1.$2.$3,");
            v = v.replace(/(\d)(\d{3}),/g, "$1.$2,");
            input.value = v !== '0,00' ? 'R$ ' + v : '';
            
            dados[emp][campo] = parseFloat(v.replace(/\./g, '').replace(',', '.')) || 0;
            localStorage.setItem(storeKey, JSON.stringify(dados));
            calcular(emp);
        }

        function criarCard(titulo, valorBase, valorAtual) {
            if(!valorBase || !valorAtual) return `<div class="p-2 border rounded-lg bg-gray-50 text-[10px] text-gray-400 text-center uppercase">Aguardando ${titulo}...</div>`;
            
            const diff = valorAtual - valorBase;
            const porc = (valorAtual / valorBase) * 100;
            const cor = diff >= 0 ? 'text-green-600 border-green-200 bg-green-50' : 'text-red-600 border-red-200 bg-red-50';

            return `
                <div class="p-2 border-l-4 rounded-lg shadow-sm ${cor} transition-all">
                    <p class="text-[9px] font-bold opacity-70 uppercase leading
