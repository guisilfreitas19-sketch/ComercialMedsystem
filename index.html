<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ranking Comercial Medsystem</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-950 text-slate-100 font-sans pb-20">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo } = React;

        function App() {
            const [sellers, setSellers] = useState([
                { id: 1, name: 'Guilherme', sales: 0, contracts: 0 },
                { id: 2, name: 'Luiz', sales: 0, contracts: 0 },
                { id: 3, name: 'Vanessa', sales: 0, contracts: 0 },
                { id: 4, name: 'João', sales: 0, contracts: 0 }
            ]);

            const handleManualUpdate = (id, field, value) => {
                const numericValue = parseFloat(value) || 0;
                setSellers(prev => prev.map(s => 
                    s.id === id ? { ...s, [field]: numericValue } : s
                ));
            };

            const topSales = useMemo(() => [...sellers].sort((a, b) => b.sales - a.sales), [sellers]);
            const topContracts = useMemo(() => [...sellers].sort((a, b) => b.contracts - a.contracts), [sellers]);

            const Podium = ({ title, data, field, activeColor }) => (
                <div className="flex-1 bg-slate-900 p-6 rounded-[2rem] border border-slate-800 shadow-xl">
                    <h2 className="text-center text-[10px] font-bold uppercase tracking-widest mb-6 text-slate-400">{title}</h2>
                    <div className="h-40 flex items-end justify-center gap-3">
                        {/* 2º lugar */}
                        <div className="flex flex-col items-center w-1/3 text-center">
                            <span className="text-[10px] mb-1 truncate w-full">{data[1].name}</span>
                            <div className="w-full bg-slate-800 h-16 rounded-t-xl border-t-2 border-slate-700 flex flex-col items-center justify-center">
                                <span className="text-[10px] font-bold">R${data[1][field]}</span>
                            </div>
                        </div>
                        {/* 1º lugar */}
                        <div className="flex flex-col items-center w-1/3 text-center">
                            <span className="text-[11px] font-black text-emerald-400 mb-1 truncate w-full uppercase">{data[0].name}</span>
                            <div className={`w-full ${activeColor} h-28 rounded-t-xl border-t-2 border-white/20 flex flex-col items-center justify-center shadow-lg`}>
                                <span className="text-xl font-black italic">1º</span>
                                <span className="text-[10px] font-bold leading-tight">R${data[0][field]}</span>
                            </div>
                        </div>
                        {/* 3º lugar */}
                        <div className="flex flex-col items-center w-1/3 text-center">
                            <span className="text-[10px] mb-1 truncate w-full opacity-50">{data[2].name}</span>
                            <div className="w-full bg-slate-800/40 h-10 rounded-t-xl border-t-2 border-slate-700 flex flex-col items-center justify-center">
                                <span className="text-[9px] font-bold opacity-50 text-center">R${data[2][field]}</span>
                            </div>
                        </div>
                    </div>
                </div>
            );

            return (
                <div className="max-w-6xl mx-auto p-4 md:p-8 space-y-8">
                    <header className="text-center bg-slate-900 p-8 rounded-[2rem] border border-slate-800 shadow-2xl">
                        <h1 className="text-3xl font-black italic uppercase tracking-tighter">RANKING <span className="text-emerald-500">LIVE</span></h1>
                        <p className="text-slate-500 text-[10px] font-bold uppercase tracking-[0.4em]">Medsystem Comercial</p>
                    </header>

                    <div className="flex flex-col md:flex-row gap-6">
                        <Podium title="💰 Total em Vendas" data={topSales} field="sales" activeColor="bg-emerald-600" />
                        <Podium title="📄 Contratos Aceitos" data={topContracts} field="contracts" activeColor="bg-blue-600" />
                    </div>

                    <div className="bg-slate-900 p-6 rounded-[2rem] border border-slate-800 shadow-xl space-y-4">
                        <h2 className="font-black text-sm uppercase tracking-widest mb-6 text-slate-400 px-2">Preenchimento Manual</h2>
                        {sellers.map(s => (
                            <div key={s.id} className="grid grid-cols-1 lg:grid-cols-3 items-center gap-4 bg-slate-950 p-4 rounded-2xl border border-slate-800">
                                <span className="font-black text-emerald-500 uppercase text-xs text-center lg:text-left">{s.name}</span>
                                
                                <div className="grid grid-cols-2 gap-4 col-span-2">
                                    {/* Campo Vendas */}
                                    <div className="flex flex-col gap-1">
                                        <label className="text-[8px] uppercase font-bold text-slate-500 ml-1">Vendas (R$)</label>
                                        <input 
                                            type="number" 
                                            value={s.sales}
                                            onChange={(e) => handleManualUpdate(s.id, 'sales', e.target.value)}
                                            className="bg-slate-900 border border-slate-800 rounded-lg p-2 text-sm font-mono text-emerald-400 focus:outline-none focus:border-emerald-500 transition-colors"
                                            placeholder="0.00"
                                        />
                                    </div>

                                    {/* Campo Contratos */}
                                    <div className="flex flex-col gap-1">
                                        <label className="text-[8px] uppercase font-bold text-slate-500 ml-1">Contratos (R$)</label>
                                        <input 
                                            type="number" 
                                            value={s.contracts}
                                            onChange={(e) => handleManualUpdate(s.id, 'contracts', e.target.value)}
                                            className="bg-slate-900 border border-slate-800 rounded-lg p-2 text-sm font-mono text-blue-400 focus:outline-none focus:border-blue-500 transition-colors"
                                            placeholder="0.00"
                                        />
                                    </div>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
