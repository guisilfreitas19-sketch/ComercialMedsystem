<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ranking Comercial - Grupo Soitic</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #09090b; color: #f8fafc; }
        .bg-card { background-color: #18181b; border: 1px solid #27272a; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        .input-currency-container { position: relative; display: flex; align-items: center; }
        .currency-symbol { position: absolute; left: 8px; font-weight: 800; font-size: 0.6rem; opacity: 0.3; pointer-events: none; }
    </style>
</head>
<body class="pb-20">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        const formatCurrency = (v) => new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(v || 0);

        function App() {
            // Estado dos Vendedores
            const [sellers, setSellers] = useState(() => {
                const saved = localStorage.getItem('soitic_v10_sellers');
                return saved ? JSON.parse(saved) : [
                    { id: 1, name: 'Guilherme', sales: 0, contracts: 0 },
                    { id: 2, name: 'Vanessa', sales: 0, contracts: 0 },
                    { id: 3, name: 'Luiz', sales: 0, contracts: 0 },
                    { id: 4, name: 'João', sales: 0, contracts: 0 }
                ];
            });

            // Estado das Empresas (Histórico)
            const [companies, setCompanies] = useState(() => {
                const saved = localStorage.getItem('soitic_v10_companies');
                return saved ? JSON.parse(saved) : [
                    { id: 'med', name: 'MEDSYSTEM', best26: 0, worst26: 0, same25: 0 },
                    { id: 'ecos', name: 'ECOS', best26: 0, worst26: 0, same25: 0 }
                ];
            });

            useEffect(() => {
                localStorage.setItem('soitic_v10_sellers', JSON.stringify(sellers));
                localStorage.setItem('soitic_v10_companies', JSON.stringify(companies));
            }, [sellers, companies]);

            const updateSeller = (id, field, val) => {
                setSellers(prev => prev.map(s => s.id === id ? { ...s, [field]: parseFloat(val) || 0 } : s));
            };

            const updateCompany = (id, field, val) => {
                setCompanies(prev => prev.map(c => c.id === id ? { ...c, [field]: parseFloat(val) || 0 } : c));
            };

            const sortedSales = useMemo(() => [...sellers].sort((a,b) => b.sales - a.sales), [sellers]);

            return (
                <div className="max-w-4xl mx-auto px-6 py-10 space-y-12">
                    <header className="text-center border-b border-zinc-800 pb-8">
                        <h1 className="text-3xl font-black italic uppercase tracking-tighter">Grupo <span className="text-amber-500">Soitic</span></h1>
                        <p className="text-[10px] font-bold text-zinc-500 tracking-[.4em] mt-2">DASHBOARD COMERCIAL</p>
                    </header>

                    {/* RANKING SIMPLIFICADO */}
                    <div className="bg-card rounded-3xl p-8 border-amber-500/20 shadow-2xl">
                        <h3 className="text-center text-[10px] font-black uppercase text-amber-500 mb-8 tracking-widest italic">Pódio de Vendas</h3>
                        <div className="flex items-end justify-center gap-4 h-40">
                            {/* 2º */}
                            <div className="flex flex-col items-center w-full">
                                <span className="text-[10px] font-bold text-zinc-400 mb-1">{sortedSales[1].name}</span>
                                <div className="w-full bg-zinc-800 h-16 rounded-t-xl flex items-center justify-center text-[10px] font-mono border-t border-white/5">
                                    {formatCurrency(sortedSales[1].sales)}
                                </div>
                            </div>
                            {/* 1º */}
                            <div className="flex flex-col items-center w-full">
                                <span className="text-2xl mb-1">👑</span>
                                <span className="text-[11px] font-black text-white mb-1 uppercase italic tracking-tighter">{sortedSales[0].name}</span>
                                <div className="bg-gradient-to-t from-emerald-600 to-emerald-400 w-full h-28 rounded-t-xl flex flex-col items-center justify-center shadow-[0_0_30px_rgba(16,185,129,0.3)] border-t border-white/30">
                                    <span className="text-3xl font-black italic">1º</span>
                                    <span className="text-[9px] font-bold">{formatCurrency(sortedSales[0].sales)}</span>
                                </div>
                            </div>
                            {/* 3º */}
                            <div className="flex flex-col items-center w-full opacity-50">
                                <span className="text-[10px] font-bold text-zinc-500 mb-1">{sortedSales[2].name}</span>
                                <div className="w-full bg-zinc-900 h-10 rounded-t-xl flex items-center justify-center text-[8px] font-mono border-t border-white/5">
                                    {formatCurrency(sortedSales[2].sales)}
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* ENTRADA DE DADOS VENDEDORES */}
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                        {sellers.map(s => (
                            <div key={s.id} className="bg-card p-4 rounded-xl flex items-center justify-between gap-4">
                                <span className="font-black text-xs uppercase italic w-20">{s.name}</span>
                                <div className="flex gap-2">
                                    <div className="input-currency-container w-28">
                                        <span className="currency-symbol text-emerald-500">R$</span>
                                        <input type="number" value={s.sales} onChange={e => updateSeller(s.id, 'sales', e.target.value)} className="bg-zinc-900 border border-zinc-800 rounded p-1.5 pl-6 text-[10px] font-mono text-emerald-400 w-full text-right" />
                                    </div>
                                    <div className="input-currency-container w-20">
                                        <span className="currency-symbol text-blue-500">CT</span>
                                        <input type="number" value={s.contracts} onChange={e => updateSeller(s.id, 'contracts', e.target.value)} className="bg-zinc-900 border border-zinc-800 rounded p-1.5 pl-6 text-[10px] font-mono text-blue-400 w-full text-right" />
                                    </div>
                                </div>
                            </div>
                        ))}
                    </div>

                    {/* HISTÓRICO POR EMPRESA (MEDSYSTEM E ECOS) */}
                    <div className="space-y-6 pt-10">
                        <h2 className="text-center text-[10px] font-black uppercase text-zinc-500 tracking-[0.5em]">Histórico por Empresa</h2>
                        <div className="grid md:grid-cols-2 gap-6">
                            {companies.map(c => (
                                <div key={c.id} className="bg-card p-6 rounded-2xl border-l-4 border-l-amber-500">
                                    <h4 className="font-black text-sm mb-6 text-white tracking-widest">{c.name}</h4>
                                    
                                    <div className="space-y-4">
                                        <div>
                                            <label className="text-[8px] font-bold text-zinc-500 uppercase block mb-1">Melhor Mês de 2026</label>
                                            <div className="input-currency-container">
                                                <span className="currency-symbol text-emerald-500">R$</span>
                                                <input type="number" value={c.best26} onChange={e => updateCompany(c.id, 'best26', e.target.value)} className="bg-zinc-900/50 border border-zinc-800 rounded-lg p-2 pl-7 text-xs font-mono text-emerald-500 w-full text-right" />
                                            </div>
                                        </div>
                                        <div>
                                            <label className="text-[8px] font-bold text-zinc-500 uppercase block mb-1 text-red-400">Pior Mês de 2026</label>
                                            <div className="input-currency-container">
                                                <span className="currency-symbol text-red-500">R$</span>
                                                <input type="number" value={c.worst26} onChange={e => updateCompany(c.id, 'worst26', e.target.value)} className="bg-zinc-900/50 border border-zinc-800 rounded-lg p-2 pl-7 text-xs font-mono text-red-500 w-full text-right" />
                                            </div>
                                        </div>
                                        <div className="pt-4 border-t border-zinc-800">
                                            <label className="text-[8px] font-bold text-zinc-400 uppercase block mb-1">Mesmo Mês de 2025</label>
                                            <div className="input-currency-container">
                                                <span className="currency-symbol">R$</span>
                                                <input type="number" value={c.same25} onChange={e => updateCompany(c.id, 'same25', e.target.value)} className="bg-transparent border border-zinc-800 rounded-lg p-2 pl-7 text-xs font-mono text-zinc-400 w-full text-right" />
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
