<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ranking Comercial Live</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-950 text-slate-100 font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo } = React;

        function App() {
            const [sellers, setSellers] = useState([
                { id: 1, name: 'Guilherme', sales: 0, contracts: 0 },
                { id: 2, name: 'Luiz', sales: 0, contracts: 0 },
                { id: 3, name: 'Vanessa', sales: 0, contracts: 0 },
                { id: 4, name: 'João', sales: 0, contracts: 0 }
            ]);

            const handleIncrement = (id, field, amount) => {
                setSellers(prev => prev.map(s => 
                    s.id === id ? { ...s, [field]: Math.max(0, s[field] + amount) } : s
                ));
            };

            const topSales = useMemo(() => [...sellers].sort((a, b) => b.sales - a.sales), [sellers]);
            const topContracts = useMemo(() => [...sellers].sort((a, b) => b.contracts - a.contracts), [sellers]);

            const Podium = ({ title, data, field, activeColor }) => (
                <div className="flex-1 bg-slate-900 p-4 rounded-[2rem] border border-slate-800 shadow-xl">
                    <h2 className="text-center text-xs font-bold uppercase tracking-widest mb-4 text-slate-400">{title}</h2>
                    <div className="h-48 flex items-end justify-center gap-2">
                        {/* 2º lugar */}
                        <div className="flex flex-col items-center w-1/3">
                            <span className="text-[10px] mb-1 truncate w-full text-center">{data[1].name}</span>
                            <div className="w-full bg-slate-800 h-20 rounded-t-lg border-t-2 border-slate-700 flex flex-col items-center justify-center">
                                <span className="text-xs font-bold">2º</span>
                                <span className="text-[8px]">R${data[1][field]}</span>
                            </div>
                        </div>
                        {/* 1º lugar */}
                        <div className="flex flex-col items-center w-1/3">
                            <span className="text-[10px] font-bold mb-1 text-emerald-400 truncate w-full text-center">{data[0].name}</span>
                            <div className={`w-full ${activeColor} h-32 rounded-t-lg border-t-2 border-white/20 flex flex-col items-center justify-center shadow-lg`}>
                                <span className="text-xl font-black italic">1º</span>
                                <span className="text-[10px] font-bold leading-none text-center">R${data[0][field]}</span>
                            </div>
                        </div>
                        {/* 3º lugar */}
                        <div className="flex flex-col items-center w-1/3">
                            <span className="text-[10px] mb-1 truncate w-full text-center opacity-50">{data[2].name}</span>
                            <div className="w-full bg-slate-800/40 h-12 rounded-t-lg border-t-2 border-slate-700 flex flex-col items-center justify-center">
                                <span className="text-xs font-bold opacity-50">3º</span>
                            </div>
                        </div>
                    </div>
                </div>
            );

            return (
                <div className="max-w-6xl mx-auto p-4 md:p-10 space-y-10">
                    <header className="flex flex-col md:flex-row justify-between items-center bg-slate-900 p-6 rounded-[2rem] border border-slate-800 shadow-2xl gap-4">
                        <div>
                            <h1 className="text-3xl font-black italic uppercase tracking-tighter text-center md:text-left">Ranking <span className="text-emerald-500">Medsystem</span></h1>
                            <p className="text-slate-500 text-[10px] font-bold uppercase tracking-widest text-center md:text-left">Performance em Tempo Real</p>
                        </div>
                    </header>

                    {/* Rankings Lado a Lado */}
                    <div className="flex flex-col md:flex-row gap-6">
                        <Podium title="💰 Ranking de Vendas" data={topSales} field="sales" activeColor="bg-emerald-600" />
                        <Podium title="📄 Contratos Aceitos" data={topContracts} field="contracts" activeColor="bg-blue-600" />
                    </div>

                    {/* Painel de Controle */}
                    <div className="bg-slate-900 p-6 md:p-8 rounded-[2rem] border border-slate-800 shadow-xl space-y-4">
                        <h2 className="font-bold text-xl mb-6 flex items-center gap-2">📝 Gestão da Equipe</h2>
                        {sellers.map(s => (
                            <div key={s.id} className="flex flex-col lg:flex-row items-center gap-4 bg-slate-950 p-4 rounded-2xl border border-slate-800">
                                <span className="font-bold min-w-[100px] text-emerald-400 uppercase text-sm">{s.name}</span>
                                
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4 w-full">
                                    {/* Coluna Vendas Primeiro */}
                                    <div className="flex-1 bg-slate-900 rounded-lg p-3 flex justify-between items-center border border-slate-800">
                                        <div className="flex flex-col">
                                            <span className="text-[9px] uppercase font-bold text-slate-500">Vendas</span>
                                            <span className="text-sm font-mono font-bold">R$ {s.sales}</span>
                                        </div>
                                        <div className="flex gap-2">
                                            <button onClick={() => handleIncrement(s.id, 'sales', -100)} className="w-8 h-8 bg-red-900/20 text-red-500 rounded-lg font-bold border border-red-900/50">-</button>
                                            <button onClick={() => handleIncrement(s.id, 'sales', 100)} className="w-8 h-8 bg-emerald-900/20 text-emerald-500 rounded-lg font-bold border border-emerald-900/50">+</button>
                                        </div>
                                    </div>

                                    {/* Coluna Contratos */}
                                    <div className="flex-1 bg-slate-900 rounded-lg p-3 flex justify-between items-center border border-slate-800">
                                        <div className="flex flex-col">
                                            <span className="text-[9px] uppercase font-bold text-slate-500">Contratos Aceitos</span>
                                            <span className="text-sm font-mono font-bold">R$ {s.contracts}</span>
                                        </div>
                                        <div className="flex gap-2">
                                            <button onClick={() => handleIncrement(s.id, 'contracts', -100)} className="w-8 h-8 bg-red-900/20 text-red-500 rounded-lg font-bold border border-red-900/50">-</button>
                                            <button onClick={() => handleIncrement(s.id, 'contracts', 100)} className="w-8 h-8 bg-blue-900/20 text-blue-500 rounded-lg font-bold border border-blue-900/50">+</button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
