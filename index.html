<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ranking Comercial - Grupo Soitic</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-[#05070a] text-slate-100 font-sans pb-20">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        // Função para formatar números no padrão R$ 0.000,00
        const formatCurrency = (value) => {
            return new Intl.NumberFormat('pt-BR', {
                style: 'currency',
                currency: 'BRL',
            }).format(value);
        };

        function App() {
            const initialState = JSON.parse(localStorage.getItem('soiticData')) || [
                { id: 1, name: 'Guilherme', sales: 0, contracts: 0, target: 6000 },
                { id: 2, name: 'Vanessa', sales: 0, contracts: 0, target: 6000 },
                { id: 3, name: 'Luiz', sales: 0, contracts: 0, target: 3000 },
                { id: 4, name: 'João', sales: 0, contracts: 0, target: 3000 }
            ];

            const [sellers, setSellers] = useState(initialState);

            useEffect(() => {
                localStorage.setItem('soiticData', JSON.stringify(sellers));
            }, [sellers]);

            const handleUpdate = (id, field, value) => {
                // Remove caracteres não numéricos para salvar o valor real
                const val = parseFloat(value) || 0;
                setSellers(prev => prev.map(s => 
                    s.id === id ? { ...s, [field]: val } : s
                ));
            };

            const resetValues = () => {
                if(confirm("Deseja zerar os valores do ranking?")) {
                    setSellers(sellers.map(s => ({ ...s, sales: 0, contracts: 0 })));
                }
            };

            const topSales = useMemo(() => [...sellers].sort((a, b) => b.sales - a.sales), [sellers]);
            const topContracts = useMemo(() => [...sellers].sort((a, b) => b.contracts - a.contracts), [sellers]);

            const Podium = ({ title, data, field, color, icon }) => (
                <div className="flex-1 bg-[#0f172a] p-6 rounded-[2.5rem] border border-slate-800 shadow-2xl">
                    <h2 className="text-center text-[10px] font-black uppercase tracking-[0.3em] mb-6 text-slate-500">{icon} {title}</h2>
                    <div className="h-44 flex items-end justify-center gap-3">
                        <div className="w-1/3 flex flex-col items-center">
                            <span className="text-[10px] font-bold mb-1 truncate w-full text-center opacity-70">{data[1].name}</span>
                            <div className="w-full bg-slate-800/50 h-20 rounded-t-2xl flex flex-col items-center justify-center border-t border-slate-700">
                                <span className="text-[9px] font-mono">{formatCurrency(data[1][field])}</span>
                            </div>
                        </div>
                        <div className="w-1/3 flex flex-col items-center">
                            <span className="text-[11px] font-black text-emerald-400 mb-1 truncate w-full text-center uppercase tracking-tighter">{data[0].name}</span>
                            <div className={`w-full ${color} h-32 rounded-t-2xl flex flex-col items-center justify-center shadow-[0_0_30px_rgba(16,185,129,0.2)] border-t-2 border-white/20`}>
                                <span className="text-3xl font-black italic text-white">1º</span>
                                <span className="text-[9px] font-bold text-center leading-none text-white px-1">{formatCurrency(data[0][field])}</span>
                            </div>
                        </div>
                        <div className="w-1/3 flex flex-col items-center">
                            <span className="text-[10px] font-bold mb-1 truncate w-full text-center opacity-40">{data[2].name}</span>
                            <div className="w-full bg-slate-800/20 h-12 rounded-t-2xl flex items-center justify-center border-t border-slate-800">
                                <span className="text-[8px] opacity-40 font-bold">{formatCurrency(data[2][field])}</span>
                            </div>
                        </div>
                    </div>
                </div>
            );

            return (
                <div className="max-w-6xl mx-auto p-4 md:p-8 space-y-8">
                    <header className="text-center py-12 bg-gradient-to-b from-slate-900 to-transparent rounded-[3rem] border-b border-slate-800">
                        <h1 className="text-4xl font-black italic uppercase tracking-tighter text-white">
                            GRUPO <span className="text-emerald-500 text-5xl tracking-normal">SOITIC</span>
                        </h1>
                        <p className="text-slate-500 text-[11px] font-bold uppercase tracking-[0.6em] mt-2">Ranking Comercial Especializado</p>
                    </header>

                    <div className="flex flex-col lg:flex-row gap-8">
                        <Podium title="Volume de Vendas" data={topSales} field="sales" color="bg-emerald-600" icon="💰" />
                        <Podium title="Contratos Aceitos" data={topContracts} field="contracts" color="bg-blue-600" icon="📄" />
                    </div>

                    <div className="bg-[#0f172a] p-8 rounded-[3rem] border border-slate-800 shadow-2xl space-y-8">
                        <div className="flex justify-between items-center border-b border-slate-800 pb-4">
                            <h2 className="font-black text-xs uppercase tracking-widest text-slate-400 italic">Painel de Lançamento</h2>
                            <button onClick={resetValues} className="text-[9px] font-black bg-red-500/10 text-red-500 px-4 py-2 rounded-full border border-red-500/20 hover:bg-red-500 hover:text-white transition-all">ZERAR DIA</button>
                        </div>

                        <div className="grid gap-6">
                            {sellers.map(s => {
                                const progress = Math.min((s.sales / s.target) * 100, 100);
                                return (
                                    <div key={s.id} className="bg-black/40 p-6 rounded-[2rem] border border-slate-800/50 hover:border-emerald-500/30 transition-all group">
                                        <div className="flex flex-col md:flex-row justify-between items-center gap-6">
                                            <div className="w-full md:w-48 text-center md:text-left">
                                                <span className="font-black text-xl text-white uppercase block leading-none group-hover:text-emerald-400 transition-colors">{s.name}</span>
                                                <span className="text-[10px] text-slate-500 font-bold italic uppercase tracking-wider">Meta: {formatCurrency(s.target)}</span>
                                            </div>
                                            <div className="grid grid-cols-2 gap-4 w-full">
                                                <div className="space-y-1">
                                                    <label className="text-[9px] font-black text-emerald-500/50 uppercase ml-2 italic">Vendas</label>
                                                    <input 
                                                        type="number" 
                                                        value={s.sales}
                                                        onChange={(e) => handleUpdate(s.id, 'sales', e.target.value)}
                                                        className="bg-slate-900/50 border border-slate-800 rounded-2xl p-3 text-sm font-mono text-emerald-400 focus:outline-none focus:border-emerald-500 w-full"
                                                        placeholder="0,00"
                                                    />
                                                </div>
                                                <div className="space-y-1">
                                                    <label className="text-[9px] font-black text-blue-500/50 uppercase ml-2 italic">Contratos</label>
                                                    <input 
                                                        type="number" 
                                                        value={s.contracts}
                                                        onChange={(e) => handleUpdate(s.id, 'contracts', e.target.value)}
                                                        className="bg-slate-900/50 border border-slate-800 rounded-2xl p-3 text-sm font-mono text-blue-400 focus:outline-none focus:border-blue-500 w-full"
                                                        placeholder="0,00"
                                                    />
                                                </div>
                                            </div>
                                        </div>
                                        <div className="mt-6 space-y-2">
                                            <div className="flex justify-between text-[10px] font-black uppercase text-slate-500 italic px-1">
                                                <span>Atingimento da Meta</span>
                                                <span className={progress >= 100 ? 'text-yellow-500' : 'text-emerald-500'}>{Math.round(progress)}%</span>
                                            </div>
                                            <div className="h-2.5 w-full bg-slate-900 rounded-full overflow-hidden border border-slate-800 p-[2px]">
                                                <div 
                                                    className={`h-full rounded-full transition-all duration-1000 ${progress >= 100 ? 'bg-gradient-to-r from-yellow-600 to-yellow-400 shadow-[0_0_15px_rgba(234,179,8,0.4)]' : 'bg-gradient-to-r from-emerald-600 to-emerald-400'}`}
                                                    style={{ width: `${progress}%` }}
                                                ></div>
                                            </div>
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
