<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ranking Comercial Medsystem</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-950 text-slate-100 font-sans pb-20">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        function App() {
            // Tenta carregar dados salvos, se não existirem, usa o padrão
            const initialState = JSON.parse(localStorage.getItem('medsystemData')) || [
                { id: 1, name: 'Guilherme', sales: 0, contracts: 0, target: 6000 },
                { id: 2, name: 'Vanessa', sales: 0, contracts: 0, target: 6000 },
                { id: 3, name: 'Luiz', sales: 0, contracts: 0, target: 3000 },
                { id: 4, name: 'João', sales: 0, contracts: 0, target: 3000 }
            ];

            const [sellers, setSellers] = useState(initialState);

            // Salva no navegador toda vez que um valor mudar
            useEffect(() => {
                localStorage.setItem('medsystemData', JSON.stringify(sellers));
            }, [sellers]);

            const handleUpdate = (id, field, value) => {
                const val = parseFloat(value) || 0;
                setSellers(prev => prev.map(s => 
                    s.id === id ? { ...s, [field]: val } : s
                ));
            };

            const resetValues = () => {
                if(confirm("Zerar o ranking de hoje?")) {
                    setSellers(sellers.map(s => ({ ...s, sales: 0, contracts: 0 })));
                }
            };

            const topSales = useMemo(() => [...sellers].sort((a, b) => b.sales - a.sales), [sellers]);
            const topContracts = useMemo(() => [...sellers].sort((a, b) => b.contracts - a.contracts), [sellers]);

            const Podium = ({ title, data, field, color }) => (
                <div className="flex-1 bg-slate-900 p-6 rounded-[2rem] border border-slate-800 shadow-xl">
                    <h2 className="text-center text-[10px] font-bold uppercase tracking-widest mb-6 text-slate-500">{title}</h2>
                    <div className="h-40 flex items-end justify-center gap-3">
                        <div className="w-1/3 flex flex-col items-center">
                            <span className="text-[9px] truncate w-full text-center">{data[1].name}</span>
                            <div className="w-full bg-slate-800 h-16 rounded-t-xl flex flex-col items-center justify-center border-t border-slate-700">
                                <span className="text-[10px] font-bold">R${data[1][field]}</span>
                            </div>
                        </div>
                        <div className="w-1/3 flex flex-col items-center">
                            <span className="text-[10px] font-black text-emerald-400 mb-1 truncate w-full text-center uppercase">{data[0].name}</span>
                            <div className={`w-full ${color} h-28 rounded-t-xl flex flex-col items-center justify-center shadow-lg border-t-2 border-white/20`}>
                                <span className="text-2xl font-black italic">1º</span>
                                <span className="text-[10px] font-bold text-center leading-none">R${data[0][field]}</span>
                            </div>
                        </div>
                        <div className="w-1/3 flex flex-col items-center">
                            <span className="text-[9px] opacity-50 truncate w-full text-center">{data[2].name}</span>
                            <div className="w-full bg-slate-800/40 h-10 rounded-t-xl flex items-center justify-center border-t border-slate-700">
                                <span className="text-[9px] opacity-50 font-bold">R${data[2][field]}</span>
                            </div>
                        </div>
                    </div>
                </div>
            );

            return (
                <div className="max-w-6xl mx-auto p-4 md:p-8 space-y-8">
                    <header className="text-center bg-slate-900 p-8 rounded-[2rem] border border-slate-800 shadow-2xl">
                        <h1 className="text-3xl font-black italic uppercase tracking-tighter">RANKING <span className="text-emerald-500">LIVE</span></h1>
                        <p className="text-slate-500 text-[10px] font-bold uppercase tracking-[0.4em]">Medsystem Comercial</p>
                    </header>

                    <div className="flex flex-col md:flex-row gap-6">
                        <Podium title="💰 Total em Vendas" data={topSales} field="sales" color="bg-emerald-600" />
                        <Podium title="📄 Contratos Aceitos" data={topContracts} field="contracts" color="bg-blue-600" />
                    </div>

                    <div className="bg-slate-900 p-6 rounded-[2rem] border border-slate-800 shadow-xl space-y-6">
                        <div className="flex justify-between items-center px-2">
                            <h2 className="font-black text-xs uppercase tracking-widest text-slate-500 italic">Lançamento de Valores</h2>
                            <button onClick={resetValues} className="text-[8px] font-bold bg-red-900/20 text-red-500 px-3 py-1 rounded-full border border-red-900/30">ZERAR TUDO</button>
                        </div>

                        {sellers.map(s => {
                            const progress = Math.min((s.sales / s.target) * 100, 100);
                            return (
                                <div key={s.id} className="bg-slate-950 p-5 rounded-3xl border border-slate-800 space-y-4">
                                    <div className="flex flex-col md:flex-row justify-between items-center gap-4">
                                        <div className="w-full md:w-40">
                                            <span className="font-black text-white uppercase text-xs block">{s.name}</span>
                                            <span className="text-[9px] text-slate-500 font-bold italic">META: R$ {s.target}</span>
                                        </div>
                                        <div className="grid grid-cols-2 gap-4 w-full">
                                            <input 
                                                type="number" 
                                                value={s.sales}
                                                onChange={(e) => handleUpdate(s.id, 'sales', e.target.value)}
                                                className="bg-slate-900 border border-slate-800 rounded-xl p-2 text-sm font-mono text-emerald-400 focus:outline-none focus:border-emerald-500"
                                                placeholder="Vendas R$"
                                            />
                                            <input 
                                                type="number" 
                                                value={s.contracts}
                                                onChange={(e) => handleUpdate(s.id, 'contracts', e.target.value)}
                                                className="bg-slate-900 border border-slate-800 rounded-xl p-2 text-sm font-mono text-blue-400 focus:outline-none focus:border-blue-500"
                                                placeholder="Contratos R$"
                                            />
                                        </div>
                                    </div>
                                    <div className="space-y-1">
                                        <div className="flex justify-between text-[8px] font-bold uppercase text-slate-500 italic">
                                            <span>Progresso</span>
                                            <span>{Math.round(progress)}%</span>
                                        </div>
                                        <div className="h-1.5 w-full bg-slate-900 rounded-full overflow-hidden border border-slate-800">
                                            <div 
                                                className={`h-full transition-all duration-700 ${progress >= 100 ? 'bg-yellow-500 shadow-[0_0_10px_#eab308]' : 'bg-emerald-500'}`}
                                                style={{ width: `${progress}%` }}
                                            ></div>
                                        </div>
                                    </div>
                                </div>
                            );
                        })}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
