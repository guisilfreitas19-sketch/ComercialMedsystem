<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ranking Comercial - Grupo Soitic</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .bg-background { background-color: #09090b; }
        .bg-card { background-color: #18181b; border: 1px solid #27272a; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        .bar-transition { transition: width 0.8s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .input-currency-container { position: relative; display: flex; align-items: center; }
        .currency-symbol { position: absolute; left: 12px; font-weight: 800; font-size: 0.7rem; opacity: 0.4; pointer-events: none; }
        .glow-emerald { box-shadow: 0 0 15px rgba(16, 185, 129, 0.2); }
        .glow-amber { box-shadow: 0 0 20px rgba(245, 158, 11, 0.3); }
    </style>
</head>
<body class="bg-background text-slate-100 pb-20">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        const TrophyIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg>
        );

        const formatCurrency = (value) => {
            return new Intl.NumberFormat('pt-BR', {
                style: 'currency',
                currency: 'BRL',
            }).format(value || 0);
        };

        function App() {
            const [sellers, setSellers] = useState(() => {
                const saved = localStorage.getItem('soitic_v3_data');
                return saved ? JSON.parse(saved) : [
                    { id: 1, name: 'Guilherme', sales: 0, contracts: 0, target: 6000 },
                    { id: 2, name: 'Vanessa', sales: 0, contracts: 0, target: 6000 },
                    { id: 3, name: 'Luiz', sales: 0, contracts: 0, target: 3000 },
                    { id: 4, name: 'João', sales: 0, contracts: 0, target: 3000 }
                ];
            });

            useEffect(() => {
                localStorage.setItem('soitic_v3_data', JSON.stringify(sellers));
            }, [sellers]);

            const handleUpdate = (id, field, value) => {
                const numValue = value === "" ? 0 : parseFloat(value);
                setSellers(prev => prev.map(s => {
                    if (s.id === id) {
                        // Confetti exclusivo para atingimento de meta de vendas
                        if (field === 'sales' && numValue >= s.target && s.sales < s.target) {
                            confetti({
                                particleCount: 150, spread: 70, origin: { y: 0.6 },
                                colors: ['#fbbf24', '#10b981', '#ffffff']
                            });
                        }
                        return { ...s, [field]: numValue };
                    }
                    return s;
                }));
            };

            const resetAll = () => {
                if(confirm("Deseja zerar todos os números atuais?")) {
                    setSellers(prev => prev.map(s => ({ ...s, sales: 0, contracts: 0 })));
                }
            };

            const sortedSales = useMemo(() => [...sellers].sort((a, b) => b.sales - a.sales), [sellers]);
            const sortedContracts = useMemo(() => [...sellers].sort((a, b) => b.contracts - a.contracts), [sellers]);

            const Podium = ({ title, data, field, accentClass }) => (
                <div className="bg-card rounded-3xl p-6 flex flex-col border border-[#27272a] hover:border-slate-700 transition-colors">
                    <div className="flex items-center gap-2 mb-8">
                        <div className={`p-2 rounded-xl bg-white/5 text-slate-400`}>
                            <TrophyIcon />
                        </div>
                        <h3 className="font-bold text-[10px] uppercase tracking-[0.2em] text-slate-500">{title}</h3>
                    </div>
                    
                    <div className="flex items-end justify-center gap-4 h-40">
                        {/* 2º Lugar */}
                        <div className="flex flex-col items-center w-full">
                            <span className="text-[10px] font-bold text-slate-500 mb-2 truncate text-center">{data[1]?.name}</span>
                            <div className="w-full bg-[#27272a] h-16 rounded-t-2xl flex items-center justify-center border-t border-white/5">
                                <span className="text-[9px] font-mono opacity-60">{formatCurrency(data[1]?.[field])}</span>
                            </div>
                        </div>
                        {/* 1º Lugar */}
                        <div className="flex flex-col items-center w-full">
                            <span className="text-[11px] font-black text-white mb-2 truncate text-center uppercase italic">{data[0]?.name}</span>
                            <div className={`w-full ${accentClass} h-28 rounded-t-2xl flex flex-col items-center justify-center shadow-2xl border-t border-white/20`}>
                                <span className="text-3xl font-black italic text-white drop-shadow-md">1º</span>
                                <span className="text-[9px] font-bold text-white/90">{formatCurrency(data[0]?.[field])}</span>
                            </div>
                        </div>
                        {/* 3º Lugar */}
                        <div className="flex flex-col items-center w-full">
                            <span className="text-[10px] font-bold text-slate-600 mb-2 truncate text-center">{data[2]?.name}</span>
                            <div className="w-full bg-[#27272a]/40 h-10 rounded-t-2xl flex items-center justify-center border-t border-white/5">
                                <span className="text-[8px] font-mono opacity-30">{formatCurrency(data[2]?.[field])}</span>
                            </div>
                        </div>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen">
                    <header className="border-b border-white/5 bg-[#09090b]/80 backdrop-blur-md sticky top-0 z-50">
                        <div className="max-w-5xl mx-auto px-6 py-5 flex items-center justify-between">
                            <div className="flex items-center gap-4">
                                <div className="w-10 h-10 rounded-xl bg-gradient-to-tr from-amber-500 to-yellow-300 flex items-center justify-center shadow-lg text-black">
                                    <TrophyIcon />
                                </div>
                                <div>
                                    <h1 className="text-xl font-black tracking-tighter text-white uppercase italic leading-none">Grupo <span className="text-amber-500">Soitic</span></h1>
                                    <span className="text-[9px] text-slate-500 font-bold uppercase tracking-[0.3em]">Performance Real-time</span>
                                </div>
                            </div>
                            <button onClick={resetAll} className="text-[9px] font-black border border-white/10 text-slate-500 px-4 py-2 rounded-full hover:bg-red-500/10 hover:text-red-500 transition-all uppercase tracking-widest">
                                Reiniciar Ciclo
                            </button>
                        </div>
                    </header>

                    <div className="max-w-5xl mx-auto px-6 py-10 space-y-12">
                        {/* Pódios: Vendas na Esquerda */}
                        <div className="grid md:grid-cols-2 gap-8">
                            <Podium title="Total em Vendas" data={sortedSales} field="sales" accentClass="bg-emerald-600 glow-emerald" />
                            <Podium title="Contratos Aceitos" data={sortedContracts} field="contracts" accentClass="bg-blue-600 shadow-blue-900/20" />
                        </div>

                        <div className="bg-card rounded-[2.5rem] overflow-hidden">
                            <div className="px-8 py-6 border-b border-white/5 flex justify-between items-center">
                                <h3 className="font-bold text-xs uppercase tracking-widest text-slate-400 font-black italic">Painel de Lançamentos</h3>
                            </div>
                            
                            <div className="p-4 md:p-8 space-y-4">
                                {sellers.map(s => {
                                    const progress = Math.min((s.sales / s.target) * 100, 100);
                                    const remaining = s.target - s.sales;
                                    return (
                                        <div key={s.id} className="p-6 rounded-3xl bg-white/[0.02] border border-white/5">
                                            <div className="flex flex-col md:flex-row items-center gap-8">
                                                <div className="w-full md:w-48">
                                                    <p className="font-black text-xl uppercase italic text-white leading-none mb-1">{s.name}</p>
                                                    <p className="text-[10px] text-slate-500 font-bold uppercase">Meta: {formatCurrency(s.target)}</p>
                                                </div>

                                                <div className="grid grid-cols-2 gap-4 w-full">
                                                    {/* Input Vendas: Sempre Primeiro */}
                                                    <div className="space-y-2">
                                                        <label className="text-[9px] font-black text-emerald-500 uppercase ml-1">Vendas (R$)</label>
                                                        <div className="input-currency-container">
                                                            <span className="currency-symbol text-emerald-500">R$</span>
                                                            <input 
                                                                type="number" 
                                                                value={s.sales || ""} 
                                                                placeholder="0,00"
                                                                onChange={(e) => handleUpdate(s.id, 'sales', e.target.value)}
                                                                className="bg-black/40 border border-white/10 rounded-2xl p-4 pl-10 text-sm font-mono text-emerald-400 focus:outline-none focus:border-emerald-500 w-full text-right"
                                                            />
                                                        </div>
                                                    </div>
                                                    {/* Input Contratos: Sempre Segundo */}
                                                    <div className="space-y-2">
                                                        <label className="text-[9px] font-black text-blue-500 uppercase ml-1">Contratos (R$)</label>
                                                        <div className="input-currency-container">
                                                            <span className="currency-symbol text-blue-500">R$</span>
                                                            <input 
                                                                type="number" 
                                                                value={s.contracts || ""} 
                                                                placeholder="0,00"
                                                                onChange={(e) => handleUpdate(s.id, 'contracts', e.target.value)}
                                                                className="bg-black/40 border border-white/10 rounded-2xl p-4 pl-10 text-sm font-mono text-blue-400 focus:outline-none focus:border-blue-500 w-full text-right"
                                                            />
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>

                                            <div className="mt-8 space-y-3">
                                                <div className="flex justify-between items-end">
                                                    <div className="text-[10px] font-bold">
                                                        {remaining <= 0 
                                                            ? <span className="text-amber-400 uppercase font-black italic tracking-wider">Objetivo Alcançado! 🏆</span> 
                                                            : <span className="text-slate-500 uppercase tracking-tighter italic">Faltam {formatCurrency(remaining)} para a meta</span>
                                                        }
